services:
  postgres:
    image: postgres:16
    container_name: teamflow_postgres
    restart: always
    environment:
      POSTGRES_USER: teamflow_user
      POSTGRES_PASSWORD: teamflow_pass
      POSTGRES_DB: teamflow_db
    ports:
      - "5432:5432"
    volumes:
      - teamflow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: teamflow_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  teamflow_postgres_data: